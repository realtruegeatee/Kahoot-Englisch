<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive quiz about The Curious Incident of the Dog in the Night-Time by Mark Haddon">
    <title>Curious Incident Quiz</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="confetti" id="confetti"></div>

    <div class="container">
        <button class="theme-toggle" aria-label="Toggle dark mode" onclick="toggleTheme()">Dark Mode</button>

        <header>
            <h1>The Curious Incident of the Dog in the Night-Time Quiz</h1>
            <p class="subtitle">Test your knowledge about Christopher Boone's incredible journey</p>
        </header>

        <main id="quiz-container">
            <!-- Start Screen -->
            <section id="start-screen">
                <h2>Welcome to the Quiz!</h2>
                <p>Select your difficulty level and test your knowledge.</p>

                <div class="difficulty-selector" role="radiogroup" aria-label="Select difficulty level">
                    <button class="difficulty-btn active" data-difficulty="easy" onclick="selectDifficulty('easy')" aria-checked="true">Easy</button>
                    <button class="difficulty-btn" data-difficulty="medium" onclick="selectDifficulty('medium')" aria-checked="false">Medium</button>
                    <button class="difficulty-btn" data-difficulty="hard" data-difficulty="hard" onclick="selectDifficulty('hard')" aria-checked="false">Hard</button>
                    <button class="difficulty-btn" data-difficulty="mixed" onclick="selectDifficulty('mixed')" aria-checked="false">Mixed</button>
                </div>

                <button onclick="startQuiz()" class="btn">Start Quiz</button>
            </section>

            <!-- Quiz Screen -->
            <section id="quiz-screen" style="display: none;">
                <div class="progress-indicator">
                    <div class="progress-stats">
                        <span>Question <span id="current-q">1</span>/<span id="total-q">15</span></span>
                        <span>Score: <span id="score">0</span></span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progress" style="width: 6%"></div>
                    </div>
                </div>

                <div class="timer-container" aria-label="Time remaining">
                    <div class="timer-bar" id="timer-bar" role="progressbar" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100"></div>
                </div>

                <div class="lifelines" aria-label="Available lifelines">
                    <button class="lifeline-btn" id="hint-btn" onclick="useHint()" aria-label="Use hint (costs points)">
                        💡 Hint
                    </button>
                    <button class="lifeline-btn" id="fifty-btn" onclick="useFiftyFifty()" aria-label="Remove two wrong answers">
                        🔥 50/50
                    </button>
                    <button class="lifeline-btn" id="skip-btn" onclick="skipQuestion()" aria-label="Skip this question">
                        ⏭ Skip
                    </button>
                </div>

                <div class="hint-box" id="hint-box" role="alert" aria-live="polite">
                    <h4>💡 Hint</h4>
                    <p class="hint-content" id="hint-content"></p>
                </div>

                <div id="questions" aria-live="polite"></div>
            </section>

            <!-- Results Screen -->
            <section id="results" aria-label="Quiz Results">
                <div class="achievement-badge" role="img" aria-label="Achievement Badge">🎉</div>
                <h2>Quiz Complete!</h2>
                <div class="score-display">
                    <span id="final-score">0</span>/<span id="final-total">15</span>
                </div>
                <p id="performance-text"></p>
                <button onclick="initQuiz()" class="btn">Play Again</button>
            </section>

            <!-- Loading -->
            <div id="loading" style="display: none; text-align: center;">
                <div class="loading-spinner"></div>
                <p>Loading quiz...</p>
            </div>
        </main>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
