name: Submit Score

# Triggered by the quiz app via GitHub's repository_dispatch API. The client sends
# a score in `client_payload`; this workflow appends it to leaderboard.json and
# commits it. Committing to main triggers the existing Pages deploy workflow, so
# the new score goes live for everyone after the next deploy.
on:
  repository_dispatch:
    types: [submit-score]

permissions:
  contents: write

jobs:
  add-score:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Append score to leaderboard.json
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          node -e '
            const fs = require("fs");
            const payload = JSON.parse(process.env.PAYLOAD || "{}");
            const file = "leaderboard.json";
            const data = JSON.parse(fs.readFileSync(file, "utf8"));
            data.entries = Array.isArray(data.entries) ? data.entries : [];
            data.entries.push({
              name: String(payload.name || "Anonymous").slice(0, 20),
              score: Number(payload.score) || 0,
              difficulty: payload.difficulty || "mixed",
              date: payload.date || new Date().toISOString().slice(0, 10)
            });
            data.entries.sort((a, b) => b.score - a.score);
            data.entries = data.entries.slice(0, 100);
            fs.writeFileSync(file, JSON.stringify(data, null, 2) + "\n");
          '

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leaderboard.json
          git commit -m "Add leaderboard score for ${{ github.event.client_payload.name }}" || echo "No changes to commit"
          git push
